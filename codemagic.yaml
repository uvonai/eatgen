workflows:
  ios-workflow:
    name: EatGen iOS Build
    max_build_duration: 60
    environment:
      node: 18
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -sdk iphoneos \
          -configuration Release \
          archive -archivePath build/App.xcarchive

    artifacts:
      - ios/App/build/**/*