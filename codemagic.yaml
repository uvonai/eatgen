workflows:
  ios-workflow:
    name: EatGen iOS Build

    environment:
      node: 22
      xcode: latest

    integrations:
      app_store_connect: Codemagic

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install -g @capacitor/cli

      - name: Build web app
        script: |
          npm run build

      - name: Generate iOS project
        script: |
          npx cap add ios || true

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild \
          -workspace App.xcworkspace \
          -scheme App \
          -sdk iphoneos \
          -configuration Release \
          archive -archivePath build/App.xcarchive

    artifacts:
      - ios/App/build/**/*.ipa