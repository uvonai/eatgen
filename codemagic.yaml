workflows:
  ios-workflow:
    name: EatGen iOS Build

    environment:
      node: 22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install -g @capacitor/cli

      - name: Build web
        script: |
          npm run build

      - name: Capacitor sync
        script: |
          npx cap sync ios

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -sdk iphoneos \
          -configuration Release \
          archive -archivePath build/App.xcarchive

    artifacts:
      - ios/App/build/**/*